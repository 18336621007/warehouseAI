version: 2
domain: ecommerce_data_warehouse

default_filters:
  paid_order_ods: "ods_order.pay_time IS NOT NULL AND ods_order.order_status IN (2,3,4)"
  paid_order_dwd: "dwd_order_detail.order_status = 4"

measures:
  - id: order_count
    zh_name: 支付订单数
    expression: "COUNT(DISTINCT ods_order.order_id)"
    base_table: ods_order
    default_filters:
      - paid_order_ods

  - id: user_count
    zh_name: 支付用户数
    expression: "COUNT(DISTINCT ods_order.user_id)"
    base_table: ods_order
    default_filters:
      - paid_order_ods

  - id: pay_amount_sum
    zh_name: 支付金额
    expression: "SUM(ods_order.pay_amount)"
    base_table: ods_order
    default_filters:
      - paid_order_ods

  - id: sale_amount_sum_dwd
    zh_name: 明细支付金额
    expression: "SUM(dwd_order_detail.pay_amount)"
    base_table: dwd_order_detail
    default_filters:
      - paid_order_dwd

dimensions:
  - id: user_id
    zh_name: 用户ID
    column: "ods_order.user_id"
    table: ods_order
    aliases: ["用户", "用户id", "用户ID"]

  - id: user_name
    zh_name: 用户名
    column: "dim_user.user_name"
    table: dim_user
    aliases: ["用户名", "姓名", "用户姓名"]
    join_path: order_to_user

  - id: phone
    zh_name: 手机号
    column: "dim_user.phone"
    table: dim_user
    aliases: ["手机号", "手机", "电话"]
    join_path: order_to_user

  - id: user_level
    zh_name: 用户等级
    column: "dim_user.user_level"
    table: dim_user
    aliases: ["用户等级", "等级", "会员等级"]
    join_path: order_to_user

  - id: sku_name
    zh_name: 商品名称
    column: "dim_sku.sku_name"
    table: dim_sku
    aliases: ["商品", "商品名", "sku", "买了什么"]
    join_path: order_to_sku

  - id: category_name
    zh_name: 类目
    column: "dim_sku.category_name"
    table: dim_sku
    aliases: ["类目", "品类", "分类"]
    join_path: order_to_sku

  - id: province
    zh_name: 省份
    column: "ods_order.province"
    table: ods_order
    aliases: ["省份", "按省"]

  - id: city
    zh_name: 城市
    column: "ods_order.city"
    table: ods_order
    aliases: ["城市", "按市"]

  - id: order_dt
    zh_name: 下单日期
    column: "DATE(ods_order.create_time)"
    table: ods_order
    aliases: ["按天", "按日", "每日", "日期", "天"]

join_paths:
  order_to_user:
    - "JOIN dim_user ON ods_order.user_id = dim_user.user_id"
  order_to_sku:
    - "JOIN ods_order_item ON ods_order.order_id = ods_order_item.order_id"
    - "JOIN dim_sku ON ods_order_item.sku_id = dim_sku.sku_id"

metrics:
  - id: paid_order_count
    zh_name: 支付订单数
    aliases: ["支付订单数", "有效订单数", "订单数"]
    expression: "{{order_count}}"
    base_table: ods_order
    measure_refs: ["order_count"]
    forbidden:
      - "count(distinct user_id)"

  - id: paid_user_count
    zh_name: 支付用户数
    aliases: ["支付用户数", "下单用户数", "有效用户数"]
    expression: "{{user_count}}"
    base_table: ods_order
    measure_refs: ["user_count"]
    forbidden:
      - "count(distinct order_id)"

  - id: gmv
    zh_name: GMV
    aliases: ["gmv", "成交额", "销售额", "总支付金额"]
    expression: "{{pay_amount_sum}}"
    base_table: ods_order
    measure_refs: ["pay_amount_sum"]
    forbidden: []

  - id: avg_order_value
    zh_name: 客单价
    aliases: ["客单价", "平均订单金额"]
    expression: "{{pay_amount_sum}} / NULLIF({{order_count}}, 0)"
    base_table: ods_order
    measure_refs: ["pay_amount_sum", "order_count"]
    forbidden: []

  - id: user_profile_lookup
    zh_name: 用户信息查询
    aliases: ["用户姓名手机号用户等级", "用户信息", "查用户资料"]
    expression: "MAX(dim_user.user_name)"
    base_table: ods_order
    measure_refs: []
    forbidden: []